<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixed Grid Layout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
    }

    header, footer {
      background-color: #f44336;
      color: white;
      text-align: center;
      padding: 1rem;
      font-weight: bold;
    }

    section {
      width: 100%;
      height: 25vh;
    }

    .section-yellow {
      background-color: #ffeb3b;
    }

    .section-blue {
      background-color: #03a9f4;
    }

    .section-blue::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg"><path d="M0,40 C300,120 600,-20 1440,80 L1440,0 L0,0 Z" fill="%2303a9f4"/></svg>') no-repeat top center;
      background-size: cover;
      z-index: -1;
    }


    .section-blue::after {     
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg"><path d="M0,60 C500,-40 900,140 1440,20 L1440,100 L0,100 Z" fill="%2303a9f4"/></svg>') no-repeat bottom center;
      background-size: cover;
      z-index: -1;
    }

    .section-purple {
      background-color: #ba68c8;
    }

    .section-grid {
      background-color: #e0e0e0;
      display: flex;
      flex-wrap: nowrap;
      padding: 1rem;
      height: auto;
    }

    .grid-left {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 0.5rem;
      width: 60%;
      aspect-ratio: 4 / 3; 
    }

    .grid-left > div {
      background-color: #03a9f4;
      aspect-ratio: 1 / 1; 
      width: 100%;
      border-radius: 4px;
    }

    .grid-center,
    .grid-right {
      background-color: white;
      margin-left: 1rem;
      border-radius: 4px;
    }

    .grid-center {
      flex: 1;
      aspect-ratio: 3 / 4;
    }

    .grid-right {
      flex: 0.5;
      aspect-ratio: 2 / 3;
    }

    @media (max-width: 900px) {
      .section-grid {
        flex-direction: column;
        align-items: center;
      }

      .grid-left {
        width: 100%;
        aspect-ratio: 4 / 3;
      }

      .grid-center,
      .grid-right {
        width: 80%;
        aspect-ratio: auto;
        height: 200px;
        margin-left: 0;
        margin-top: 1rem;
      }
    }
  </style>
</head>
<body>

  <header>HEADER</header>

  <section class="section-yellow"></section>
  <section class="section-blue"></section>
  <section class="section-purple"></section>

  <section class="section-grid">
    <div class="grid-left">
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
    </div>
    <div class="grid-center"></div>
    <div class="grid-right"></div>
  </section>

  <footer>FOOTER</footer>

</body>
</html>
